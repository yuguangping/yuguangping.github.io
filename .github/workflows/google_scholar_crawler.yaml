name: Get Citation Data

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
    steps:
    - name: Check Google Scholar ID
      id: scholar
      run: |
        if [ -z "$GOOGLE_SCHOLAR_ID" ]; then
          echo "GOOGLE_SCHOLAR_ID is not set; skipping citation crawler."
          echo "enabled=false" >> "$GITHUB_OUTPUT"
        else
          echo "enabled=true" >> "$GITHUB_OUTPUT"
        fi
    - uses: actions/checkout@v2
      if: steps.scholar.outputs.enabled == 'true'
    - name: Install Reqs
      if: steps.scholar.outputs.enabled == 'true'
      run: |
        sudo apt-get install python3-setuptools
    - name: Run
      if: steps.scholar.outputs.enabled == 'true'
      run: |
        cd ./google_scholar_crawler
        pip3 install -r requirements.txt
        python3 main.py
        cd ./results
        git init
        git config --local user.name "${GITHUB_ACTOR}"
        export remote_repo="https://${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
        git add *.json
        git commit -m "Updated Citation Data"
        git push "${remote_repo}" HEAD:google-scholar-stats --force
